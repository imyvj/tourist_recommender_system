# Scraping
scraping:
  max_reviews_per_poi: 100
  delay_seconds: 5
  scraper_path: "tools/google-review-scraper/scraper.js" # Path to scraper
  output_dir: "data/scraped/reviews/"
  node_path: "node"

# Clustering
clustering:
  min_clusters: 2
  max_clusters: 15
  genetic_algorithm:
    population_size: 50
    generations: 100
    crossover_rate: 0.8
    mutation_rate: 0.1

# NCF training
ncf:
  embedding_dim: 32
  batch_size: 128
  epochs: 30
  validation_split: 0.1
  learning_rate: 0.001

# Evaluation
evaluation:
  k_values: [5, 10, 20]
  random_seed: 42
